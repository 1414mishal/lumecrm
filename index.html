<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LuMe | Agency Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #0f172a; 
            color: #f1f5f9; 
            margin: 0; 
            padding-bottom: 80px; /* Space for bottom nav */
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .nav-item.active { color: #a855f7; }
        
        .glass-card { 
            background: #1e293b; 
            border: 1px solid #334155; 
            border-radius: 20px; 
            padding: 16px;
            margin-bottom: 12px;
        }

        /* Mobile specific fixes */
        input, select, textarea, button {
            touch-action: manipulation;
            font-size: 16px !important;
        }

        .fab {
            position: fixed;
            bottom: 90px;
            right: 20px;
            background: #a855f7;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 10px 25px rgba(168, 85, 247, 0.4);
            z-index: 100;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: #1e293b;
            border-top: 1px solid #334155;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="p-6 flex justify-between items-center bg-[#0f172a] sticky top-0 z-50">
        <div>
            <h1 class="text-2xl font-extrabold italic">LuMe<span class="text-purple-500">.</span></h1>
        </div>
        <div id="status-icon" class="text-[10px] bg-emerald-500/10 text-emerald-500 px-3 py-1 rounded-full font-bold">
            SYSTEM LIVE
        </div>
    </header>

    <!-- Content Area -->
    <main class="p-4">
        
        <!-- DASHBOARD TAB -->
        <section id="dash" class="tab-content active">
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="glass-card">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Total Revenue</p>
                    <h3 id="stat-rev" class="text-xl font-bold">₹0</h3>
                </div>
                <div class="glass-card">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Sales Cuts</p>
                    <h3 id="stat-comm" class="text-xl font-bold text-purple-400">₹0</h3>
                </div>
                <div class="glass-card">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Net Profit</p>
                    <h3 id="stat-profit" class="text-xl font-bold text-blue-400">₹0</h3>
                </div>
                <div class="glass-card">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Client Owed</p>
                    <h3 id="stat-due" class="text-xl font-bold text-red-500">₹0</h3>
                </div>
            </div>
            
            <h4 class="font-bold mb-3 text-sm text-slate-400 uppercase tracking-widest">Upcoming Meetings</h4>
            <div id="meet-list"></div>
        </section>

        <!-- CLIENTS TAB -->
        <section id="clients" class="tab-content">
            <h4 class="font-bold mb-4 text-xl">Project Pipeline</h4>
            <div id="client-list"></div>
        </section>

        <!-- SALES TAB -->
        <section id="sales" class="tab-content">
            <h4 class="font-bold mb-4 text-xl">Commission Ledger</h4>
            <div id="sales-list"></div>
        </section>

    </main>

    <!-- Floating Add Button -->
    <button class="fab" onclick="openModal()">
        <i class="fa-solid fa-plus text-white"></i>
    </button>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button onclick="switchTab('dash')" class="nav-item active flex flex-col items-center">
            <i class="fa-solid fa-chart-simple text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">Home</span>
        </button>
        <button onclick="switchTab('clients')" class="nav-item flex flex-col items-center">
            <i class="fa-solid fa-folder-open text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">Pipeline</span>
        </button>
        <button onclick="switchTab('sales')" class="nav-item flex flex-col items-center">
            <i class="fa-solid fa-indian-rupee-sign text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">Sales</span>
        </button>
    </nav>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/95 hidden z-[200] p-4 overflow-y-auto">
        <div class="bg-[#1e293b] w-full max-w-lg mx-auto mt-10 rounded-3xl p-6 border border-slate-700">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">New Project</h3>
                <button onclick="closeModal()" class="text-2xl text-slate-500">&times;</button>
            </div>
            <form id="entryForm" class="space-y-4">
                <input type="text" id="name" placeholder="Client Name" required class="w-full bg-[#0f172a] border border-slate-700 p-4 rounded-xl">
                <input type="text" id="salesman" placeholder="Salesperson Name" class="w-full bg-[#0f172a] border border-slate-700 p-4 rounded-xl">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="webFee" placeholder="Website Fee (₹)" required class="w-full bg-[#0f172a] border border-slate-700 p-4 rounded-xl">
                    <input type="number" id="domainFee" placeholder="Domain Fee (₹)" class="w-full bg-[#0f172a] border border-slate-700 p-4 rounded-xl">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="commRate" placeholder="Sales %" class="w-full bg-[#0f172a] border border-slate-700 p-4 rounded-xl">
                    <input type="number" id="paid" placeholder="Amount Paid (₹)" class="w-full bg-[#0f172a] border border-slate-700 p-4 rounded-xl">
                </div>
                <input type="datetime-local" id="meet" class="w-full bg-[#0f172a] border border-slate-700 p-4 rounded-xl">
                <select id="status" class="w-full bg-[#0f172a] border border-slate-700 p-4 rounded-xl">
                    <option>Lead</option>
                    <option>Active</option>
                    <option>Completed</option>
                </select>
                <button type="submit" class="w-full bg-purple-600 py-4 rounded-xl font-bold text-lg">SAVE PROJECT</button>
            </form>
        </div>
    </div>

    <script>
        // CONFIG - Put your URL here
        const SUPABASE_URL = "PASTE_YOUR_SUPABASE_URL_HERE"; 
        const SUPABASE_KEY = "gjkxpbsamvdjxeivtcja";
        
        let client;
        let isCloud = false;

        // Try to connect to Supabase, otherwise use LocalStorage
        try {
            client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            isCloud = SUPABASE_URL !== "PASTE_YOUR_SUPABASE_URL_HERE";
        } catch(e) { console.log("Cloud not ready, using local memory."); }

        let data = JSON.parse(localStorage.getItem('lume_local')) || [];

        // Tab Switching Logic
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        async function syncData() {
            if (isCloud) {
                const { data: cloudData } = await client.from('projects').select('*');
                if (cloudData) data = cloudData;
            }
            render();
        }

        document.getElementById('entryForm').onsubmit = async (e) => {
            e.preventDefault();
            const newItem = {
                id: Date.now().toString(),
                name: document.getElementById('name').value,
                salesman: document.getElementById('salesman').value || 'Owner',
                website_fee: parseFloat(document.getElementById('webFee').value) || 0,
                domain_fee: parseFloat(document.getElementById('domainFee').value) || 0,
                comm_rate: parseFloat(document.getElementById('commRate').value) || 0,
                amount_paid: parseFloat(document.getElementById('paid').value) || 0,
                next_meeting: document.getElementById('meet').value,
                status: document.getElementById('status').value
            };

            if (isCloud) {
                await client.from('projects').insert([newItem]);
            } else {
                data.push(newItem);
                localStorage.setItem('lume_local', JSON.stringify(data));
            }
            
            closeModal();
            syncData();
        };

        async function deleteItem(id) {
            if(!confirm("Delete?")) return;
            if(isCloud) {
                await client.from('projects').delete().eq('id', id);
            } else {
                data = data.filter(x => x.id !== id);
                localStorage.setItem('lume_local', JSON.stringify(data));
            }
            syncData();
        }

        function render() {
            // Stats
            const revenue = data.reduce((a, b) => a + b.amount_paid, 0);
            const comms = data.reduce((a, b) => a + (b.website_fee * (b.comm_rate/100)), 0);
            const domains = data.reduce((a, b) => a + b.domain_fee, 0);
            const profit = data.reduce((a, b) => a + (b.website_fee - (b.website_fee * (b.comm_rate/100)) - b.domain_fee), 0);
            const due = data.reduce((a, b) => a + ((b.website_fee + b.domain_fee) - b.amount_paid), 0);

            document.getElementById('stat-rev').innerText = `₹${revenue.toLocaleString()}`;
            document.getElementById('stat-comm').innerText = `₹${comms.toLocaleString()}`;
            document.getElementById('stat-profit').innerText = `₹${profit.toLocaleString()}`;
            document.getElementById('stat-due').innerText = `₹${due.toLocaleString()}`;

            // Lists
            document.getElementById('client-list').innerHTML = data.map(x => `
                <div class="glass-card">
                    <div class="flex justify-between items-start">
                        <div>
                            <h5 class="font-bold text-lg">${x.name}</h5>
                            <span class="text-[10px] bg-purple-500/20 text-purple-400 px-2 py-1 rounded-md font-bold uppercase">${x.status}</span>
                        </div>
                        <button onclick="deleteItem('${x.id}')" class="text-slate-600"><i class="fa-solid fa-trash"></i></button>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mt-4 border-t border-slate-700 pt-4">
                        <div>
                            <p class="text-[10px] text-slate-500 font-bold">TOTAL BUDGET</p>
                            <p class="text-sm font-bold">₹${(x.website_fee + x.domain_fee).toLocaleString()}</p>
                        </div>
                        <div>
                            <p class="text-[10px] text-slate-500 font-bold">BALANCE DUE</p>
                            <p class="text-sm font-bold text-red-500">₹${((x.website_fee + x.domain_fee) - x.amount_paid).toLocaleString()}</p>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('sales-list').innerHTML = data.map(x => `
                <div class="glass-card flex justify-between items-center">
                    <div>
                        <p class="text-[10px] text-slate-500 font-bold uppercase">${x.salesman}</p>
                        <h5 class="font-bold">${x.name}</h5>
                    </div>
                    <div class="text-right">
                        <p class="text-xl font-black text-purple-400">₹${(x.website_fee * (x.comm_rate/100)).toLocaleString()}</p>
                        <p class="text-[9px] text-slate-500">${x.comm_rate}% of ₹${x.website_fee.toLocaleString()}</p>
                    </div>
                </div>
            `).join('');

            document.getElementById('meet-list').innerHTML = data.filter(x => x.next_meeting).map(x => `
                <div class="glass-card flex justify-between items-center">
                    <span class="font-bold text-sm">${x.name}</span>
                    <span class="text-xs text-purple-400">${new Date(x.next_meeting).toLocaleString([], {dateStyle:'short', timeStyle:'short'})}</span>
                </div>
            `).join('');
        }

        // Init
        syncData();
    </script>
</body>
</html>
